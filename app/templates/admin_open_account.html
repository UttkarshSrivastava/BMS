<!DOCTYPE html>
<html>
<head>
<title>Admin Open Account</title>

<style>
body{
    font-family:Poppins;
    background:#eef3ff;
    margin:0;
    display:flex;
}

.sidebar{
    width:240px;
    background:#002b7f;
    color:white;
    padding:20px;
    height:100vh;
}

.main{
    margin-left:240px;
    padding:20px;
    width:100%;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.approve{background:#0057ff;color:white;}
.reject{background:red;color:white;}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <p>Final Approval</p>
</div>

<div class="main">

<h2>Pending Applications</h2>

<div id="container"></div>

</div>

<script>

const adminId = 1;

async function loadRequests(){

    const res = await fetch(
        `/admin/open-account/pending/${adminId}`
    );

    const data = await res.json();

    let html = "";

    data.forEach(r=>{

        html += `
        <div class="card">

            <h3>${r.full_name}</h3>
            <p>${r.mobile}</p>
            <p>${r.email}</p>
            <p>Branch: ${r.branch_name}</p>
            <p>Deposit: ₹${r.deposit_amount}</p>

            <button class="approve"
            onclick="approve(${r.id})">
                Approve & Create Account
            </button>

            <button class="reject"
            onclick="reject(${r.id})">
                Reject
            </button>

        </div>
        `;
    });

    document.getElementById("container").innerHTML = html;
}


/* APPROVE */
async function approve(id){

    const res = await fetch(
        `/admin/open-account/approve/${id}`,
        {method:"PUT"}
    );

    const data = await res.json();

    alert(
        "Account Created\nAccount: " +
        data.account_number +
        "\nUsername: " +
        data.username
    );

    loadRequests();
}


/* REJECT */
async function reject(id){

    await fetch(
        `/admin/open-account/reject/${id}?remark=Rejected`,
        {method:"PUT"}
    );

    alert("Rejected");
    loadRequests();
}

loadRequests();

</script>

</body>
</html>
