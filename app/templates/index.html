<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBI Careers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f8fb; color: #222; }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #fff;
      padding: 10px 40px;
      border-bottom: 3px solid #e2e2e2;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo img {
      height: 50px;
      border-radius: 6px;
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: bold;
      color: #0b3c8a;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #3b0a78;
      color: white;
      padding: 12px 40px;
      font-weight: bold;
    }

    .top-bar button {
      background-color: #ffcc00;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .top-bar button:hover { background-color: #e6b800; }

    /* Navbar */
    nav {
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      gap: 40px;
      border-bottom: 2px solid #e6e6e6;
    }

    nav a {
      text-decoration: none;
      color: #000;
      font-weight: 600;
      position: relative;
      transition: color 0.3s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #0b3c8a;
      transition: width 0.3s;
    }

    nav a:hover { color: #0b3c8a; }
    nav a:hover::after { width: 100%; }

    /* Hero Section - Full Image (No Cropping) */
    .hero {
      position: relative;
      width: 100%;
      height: 420px;
      background-color: #000;
      background-image: url("""C:\BMS\app\static\images\opalina.png""");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain; /* Show full image */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: fadeZoom 2s ease-in-out;
    }

    @keyframes fadeZoom {
      from { opacity: 0; transform: scale(1.1); }
      to { opacity: 1; transform: scale(1); }
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.4));
    }

    .hero h1 {
      position: relative;
      color: white;
      font-size: 2.5rem;
      font-weight: bold;
      text-align: center;
      z-index: 1;
      letter-spacing: 1px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
    }

    /* Info Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      padding: 60px 80px;
      background-color: #e9f1f7;
    }

    .card {
      background-color: #fff;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .card img {
      height: 70px;
      margin-bottom: 15px;
    }

    .card h3 {
      color: #0b3c8a;
      font-size: 1.1rem;
      margin-top: 10px;
    }

    /* Footer */
    footer {
      background-color: #0b3c8a;
      color: white;
      text-align: center;
      padding: 25px;
      margin-top: 40px;
    }

    footer i {
      margin: 0 10px;
      cursor: pointer;
      transition: color 0.3s;
    }

    footer i:hover { color: #ffcc00; }

    footer p {
      margin-top: 10px;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { flex-wrap: wrap; gap: 20px; padding: 10px; }
      .hero h1 { font-size: 1.8rem; padding: 0 20px; }
      .cards { padding: 30px; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="https://opalina.com/assets/images/logos/opalina_logo.png" alt="SBI Logo">
      <span>Opalina Bank</span>
      
    </div>
  </header>

  <!-- Top Bar -->
  <div class="top-bar">
    <span>CAREERS</span>
    <button>CONTACT US</button>
  </div>

  <!-- Navbar -->
  <nav>
  <a href="/">HOME</a>
<a href="/signup">SIGNUP</a>
<a href="/login">LOGIN</a>
    <a href="#">WHY SBI</a>
    <a href="#">LIFE AT SBI</a>
    <a href="#">THE SBI STORY</a>
    

  </nav>

  <!-- Hero Section -->
  <section class="hero">
  <!-- <h1>EXPLORE BOUNDLESS POSSIBILITIES<br>WITH GLOBAL BANKING</h1>-->
  </section>

  <!-- Info Cards -->
  <section class="cards">
    <div class="card">
      <img src="https://upload.wikimedia.org/wikipedia/en/2/24/State_Bank_of_India_logo.svg" alt="Why SBI">
      <h3>WHY SBI?</h3>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/1087/1087927.png" alt="Openings">
      <h3>CURRENT OPENINGS</h3>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/4470/4470310.png" alt="Results">
      <h3>RECRUITMENT RESULTS</h3>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/1510/1510715.png" alt="Archive">
      <h3>RECRUITMENT ARCHIVE</h3>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/992/992700.png" alt="Forms">
      <h3>DOWNLOAD FORMS</h3>
    </div>
   
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div>
      <i class="fab fa-linkedin"></i>
      <i class="fab fa-facebook"></i>
      <i class="fab fa-youtube"></i>
      <i class="fab fa-x-twitter"></i>
      <i class="fab fa-instagram"></i>
    </div>
    <p>© 2025 State Bank of India. All rights reserved.</p>
  </footer>

</body>
</html>
