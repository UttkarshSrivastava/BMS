<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Open Account Requests</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef3ff;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#002b7f;
    height:100vh;
    position:fixed;
    padding:25px;
    color:white;
}

.logo{text-align:center;margin-bottom:35px;}
.logo h1{font-size:42px;}

.menu a{
    display:block;
    text-decoration:none;
    color:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
}

.menu a.active,
.menu a:hover{
    background:#0057ff;
}

/* MAIN */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{color:#002b7f;}

.datetime{
    background:white;
    padding:15px 20px;
    border-radius:15px;
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:18px;
}

.stat-card p{
    font-size:26px;
    font-weight:700;
    color:#002b7f;
}

/* REQUEST CARD */
.request-card{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

.request-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status{
    padding:8px 14px;
    border-radius:20px;
    font-size:12px;
}

.pending{background:#fff4d8;color:#b57b00;}
.approved{background:#e8fff1;color:green;}
.rejected{background:#ffeaea;color:red;}

.details-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:15px;
}

.detail-box{
    background:#f7f9ff;
    padding:12px;
    border-radius:12px;
}

.detail-box h4{
    font-size:12px;
    color:#777;
}

.detail-box p{
    color:#002b7f;
    font-weight:600;
}

.button-group{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.btn{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.approve-btn{background:#0057ff;color:white;}
.reject-btn{background:#ff4d4d;color:white;}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        
        <p>Employee Dashboard</p>
    </div>

    <div class="menu">
        <a href="#" class="active">Open Requests</a>
        <a href="#">Approved</a>
        <a href="#">Rejected</a>
        <a href="#">Logout</a>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <div>
            <h1>Open Account Requests</h1>
            <p>Pending Applications</p>
        </div>

        <div class="datetime" id="datetime"></div>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card">
            <h3>Total</h3>
            <p id="totalRequests">0</p>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <p id="pendingRequests">0</p>
        </div>

        <div class="stat-card">
            <h3>Approved</h3>
            <p id="approvedRequests">0</p>
        </div>

        <div class="stat-card">
            <h3>Rejected</h3>
            <p id="rejectedRequests">0</p>
        </div>
    </div>

    <div id="requestContainer"></div>

</div>

<script>

/* TIME */
setInterval(()=>{
    document.getElementById("datetime").innerText =
        new Date().toLocaleString();
},1000);


/* GET BRANCH FROM STORAGE */
const branchId =
    localStorage.getItem("employeeBranchId");


/* LOAD REQUESTS */
async function loadRequests(){

    if(!branchId){
        alert("Employee not logged in properly");
        return;
    }

    try{

        const res = await fetch(
            `/employee/open-account/pending/1`
        );

        const data = await res.json();

        document.getElementById("totalRequests").innerText =
            data.length || 0;

        document.getElementById("pendingRequests").innerText =
            data.length || 0;

        render(data);

    }catch(err){
        console.log(err);
    }
}


/* RENDER */
function render(data){

    let html = "";

    data.forEach(app=>{

        html += `
        <div class="request-card">

            <div class="request-top">

                <div>
                    <h2>${app.full_name || ""}</h2>
                    <p>${app.id || ""}</p>
                </div>

                <div class="status pending">
                    ${app.employee_status || "Pending"}
                </div>

            </div>

            <div class="details-grid">

                <div class="detail-box">
                    <h4>Mobile</h4>
                    <p>${app.mobile || ""}</p>
                </div>

                <div class="detail-box">
                    <h4>Email</h4>
                    <p>${app.email || ""}</p>
                </div>

                <div class="detail-box">
                    <h4>Branch</h4>
                    <p>${app.branch_name || ""}</p>
                </div>

                <div class="detail-box">
                    <h4>Aadhaar</h4>
                    <p>${app.aadhaar || ""}</p>
                </div>

                <div class="detail-box">
                    <h4>PAN</h4>
                    <p>${app.pan || ""}</p>
                </div>

                <div class="detail-box">
                    <h4>Deposit</h4>
                    <p>₹ ${app.deposit_amount || 0}</p>
                </div>

            </div>

            <div class="button-group">

                <button class="btn approve-btn"
                onclick="approve(${app.id})">
                    Approve
                </button>

                <button class="btn reject-btn"
                onclick="reject(${app.id})">
                    Reject
                </button>

            </div>

        </div>
        `;
    });

    document.getElementById("requestContainer")
    .innerHTML = html;
}


/* APPROVE */
async function approve(id){

    await fetch(
        `/employee/open-account/approve/${id}`,
        {method:"PUT"}
    );

    alert("Approved");
    loadRequests();
}


/* REJECT */
async function reject(id){

    await fetch(
        `/employee/open-account/reject/${id}`,
        {method:"PUT"}
    );

    alert("Rejected");
    loadRequests();
}


/* INIT */
loadRequests();

</script>

</body>
</html>
