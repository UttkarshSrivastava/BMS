<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Card Requests</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
    body{background:#f4f7fb;display:flex;}

    .sidebar{
      width:260px;
      height:100vh;
      background:linear-gradient(to bottom,#001b4d,#002d72);
      color:white;
      position:fixed;
      overflow-y:auto;
      padding:20px 15px;
    }

    .sidebar .brand{font-size:24px;font-weight:800;margin-bottom:20px;}

    .menu{margin-top:10px;}
    .menu a{
      display:block;
      color:white;
      text-decoration:none;
      padding:12px 14px;
      border-radius:12px;
      margin-bottom:8px;
    }
    .menu a:hover,.menu a.active{background:#0d6efd;}

    .main{margin-left:260px;width:calc(100% - 260px);padding:25px;}

    .topbar{background:white;border-radius:18px;padding:18px 25px;display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;box-shadow:0 4px 15px rgba(0,0,0,0.05);}
    .topbar h1{font-size:26px;color:#1d2b53;}

    .btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:bold;}
    .btn-approve{background:#28a745;color:white;}
    .btn-reject{background:#dc3545;color:white;}
    .btn-refresh{background:#0b57d0;color:white;}

    table{width:100%;border-collapse:collapse;margin-top:10px;background:white;border-radius:15px;overflow:hidden;}
    th{background:#f3f4f6;padding:12px;text-align:left;color:#333;font-size:13px;}
    td{padding:12px;border-bottom:1px solid #eee;font-size:13px;vertical-align:top;}

    .muted{color:#888;}
    .status{padding:6px 10px;border-radius:20px;font-size:12px;display:inline-block;}
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand">Admin</div>
    <div class="menu">
      <a href="/admin">Dashboard</a>
      <a href="/admin-open-account/dashboard">Account Requests</a>
      <a href="/admin/card-requests" class="active">Card Requests</a>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>Card Requests</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-refresh" onclick="loadRequests()">Refresh</button>
        <button class="btn" style="background:#fff;border:1px solid #e5e5e5;" onclick="logout()">Logout</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Card</th>
          <th>Delivery</th>
          <th>Status</th>
          <th>Documents</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="reqBody"></tbody>
    </table>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    async function loadRequests(){
      const token = localStorage.getItem('access_token');
      if(!token){
        alert('Login required');
        window.location.href = '/login';
        return;
      }

      const res = await fetch(`${API_BASE}/admin/card-requests/pending`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();
      if(!res.ok || !data.success){
        alert(data.detail || data.message || 'Failed to load');
        return;
      }

      const body = document.getElementById('reqBody');
      body.innerHTML = '';

      (data.requests || []).forEach(r => {
        const docs = `
          <div><b>Aadhaar:</b> ${r.aadhaar_document || '-'}</div>
          <div><b>PAN:</b> ${r.pan_document || '-'}</div>
          <div><b>Income:</b> ${r.income_proof || '-'}</div>
          <div><b>Photo:</b> ${r.photo || '-'}</div>
        `;

        body.innerHTML += `
          <tr>
            <td>${r.request_id}</td>
            <td>
              <div>${r.full_name || ''}</div>
              <div class="muted">Acct: ${r.account_number || ''}</div>
            </td>
            <td>
              <div>${r.card_type || ''} (${r.card_variant || ''})</div>
              <div class="muted">${r.network || ''}</div>
              <div class="muted">Credit: ${r.credit_limit || ''}</div>
            </td>
            <td>
              <div>${r.address || ''}</div>
              <div class="muted">${r.city || ''} - ${r.pincode || ''}</div>
            </td>
            <td>
              <div><b>Status:</b> ${r.status || ''}</div>
              <div><b>Admin:</b> ${r.admin_status || ''}</div>
            </td>
            <td>${docs}</td>
            <td>
              <button class="btn btn-approve" onclick="approve(${r.request_id})">Approve</button>
              <button class="btn btn-reject" style="margin-left:8px;" onclick="reject(${r.request_id})">Reject</button>
            </td>
          </tr>
        `;
      });
    }

    async function approve(id){
      const token = localStorage.getItem('access_token');
      const ok = confirm('Approve this card request?');
      if(!ok) return;

      const res = await fetch(`${API_BASE}/admin/card-requests/approve/${id}`, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();
      if(!res.ok || !data.success){
        alert(data.detail || data.message || 'Approve failed');
        return;
      }
      alert('Approved');
      await loadRequests();
    }

    async function reject(id){
      const token = localStorage.getItem('access_token');
      const ok = confirm('Reject this card request?');
      if(!ok) return;

      const res = await fetch(`${API_BASE}/admin/card-requests/reject/${id}`, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();
      if(!res.ok || !data.success){
        alert(data.detail || data.message || 'Reject failed');
        return;
      }
      alert('Rejected');
      await loadRequests();
    }

    function logout(){
      sessionStorage.clear();
      localStorage.clear();
      window.location.href = '/login';
    }

    window.onload = loadRequests;
  </script>
</body>
</html>
