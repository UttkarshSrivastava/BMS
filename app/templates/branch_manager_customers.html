<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Manager - Customers</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{--primary:#0b3a6d;--bg:#f4f6f9}
    body{font-family:'Poppins',sans-serif;background:var(--bg)}
    .sidebar{position:fixed;left:0;top:0;width:240px;height:100%;background:var(--primary);color:#fff;padding-top:20px}
    .sidebar a{display:block;padding:12px 18px;color:#fff;text-decoration:none;font-weight:600;border-left:4px solid transparent}
    .sidebar a:hover{background:#0f4a86;border-left-color:#ffc107}
    .main{margin-left:240px;padding:22px}
    .header{background:#fff;padding:14px 18px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px}
  </style>
</head>
<body>
  <div class="sidebar">
    <h4 class="text-center mb-4" style="color:#fff;">Branch Manager</h4>
    <a href="branch_manager_dashboard.html">Dashboard</a>
    <a href="branch_manager_employees.html">Employees</a>
    <a href="branch_manager_accounts.html">Accounts</a>
    <a href="branch_manager_transactions.html">Transactions</a>
    <a href="branch_manager_transfer.html">Transfer</a>
    <a href="branch_manager_loans.html">Loans</a>
    <a href="branch_manager_customers.html" style="background:#0f4a86;border-left-color:#ffc107;">Customers</a>
    <a href="Login.html">Logout</a>
  </div>

  <div class="main">
    <div class="header">
      <div>
        <h3 class="mb-0">Customer Management</h3>
        <div class="text-muted small">Branch-scoped view + search</div>
      </div>
      <button class="btn btn-sm btn-outline-primary" id="refreshBtn">Refresh</button>
    </div>

    <div id="alertBox" class="alert alert-danger" style="display:none"></div>

    <div class="table-wrap mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0">Customers</h5>
        <div class="input-group input-group-sm" style="max-width:420px;">
          <input id="searchInput" type="text" class="form-control" placeholder="Search name or account number" />
          <button class="btn btn-outline-primary" id="searchBtn" type="button">Search</button>
        </div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Customer Name</th>
              <th>Account Number</th>
              <th>Balance</th>
              <th>Branch</th>
            </tr>
          </thead>
          <tbody id="customersBody">
            <tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="text-muted small mt-2" id="countText"></div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const token = sessionStorage.getItem('access_token');

    function showError(msg){
      const el = document.getElementById('alertBox');
      el.style.display = 'block';
      el.textContent = msg;
    }

    function clearError(){
      const el = document.getElementById('alertBox');
      el.style.display = 'none';
      el.textContent = '';
    }

    async function apiGet(path){
      if(!token) throw new Error('Missing access token');
      const res = await fetch(`${API_BASE}${path}`,{
        headers:{'Authorization':`Bearer ${token}`}
      });
      const text = await res.text();
      let data;
      try{ data = JSON.parse(text); }catch{ data = { message: text }; }
      if(!res.ok) throw new Error(data.detail || data.message || 'Request failed');
      return data;
    }

    async function loadCustomers(){
      clearError();
      const tbody = document.getElementById('customersBody');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr>';

      const q = (document.getElementById('searchInput').value || '').trim();
      const qs = q ? `?search=${encodeURIComponent(q)}` : '';

      const data = await apiGet(`/api/manager/customers${qs}`);
      const customers = data.customers || [];

      document.getElementById('countText').textContent = `Total: ${data.count ?? customers.length}`;

      tbody.innerHTML = customers.map(c => `
        <tr>
          <td>${c.id ?? ''}</td>
          <td>${c.customer_name ?? ''}</td>
          <td>${c.account_number ?? ''}</td>
          <td>₹${Number(c.balance ?? 0).toFixed(2)}</td>
          <td>${c.branch_name ?? ''}</td>
        </tr>
      `).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', loadCustomers);
    document.getElementById('refreshBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      loadCustomers();
    });

    // init
    (async ()=>{
      try{ await loadCustomers(); }
      catch(e){ showError(e.message); }
    })();
  </script>
</body>
</html>
