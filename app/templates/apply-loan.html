<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply Loan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef3ff;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.title{
    margin-bottom:25px;
}

.title h1{
    color:#002b7f;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#444;
}

.input-box input,
.input-box select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #dce3ff;
    background:#f8faff;
}

.emi-box{
    margin-top:20px;
    background:#f5f8ff;
    padding:20px;
    border-radius:14px;
}

.emi-box h2{
    color:#002b7f;
}

.btn{
    margin-top:25px;
    background:#0057ff;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    cursor:pointer;
}

@media(max-width:800px){

    .grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">

<h1>Apply Loan</h1>

<p>Apply for personal/home/business loan</p>

</div>

<div class="grid">

<div class="input-box">
<label>Account Number</label>
<input type="text" id="accountNumber" readonly>
</div>

<div class="input-box">
<label>Customer Name</label>
<input type="text" id="customerName" readonly>
</div>

<div class="input-box">
<label>Loan Type</label>
<select id="loanType">
<option>Personal Loan</option>
<option>Home Loan</option>
<option>Business Loan</option>
<option>Education Loan</option>
</select>
</div>

<div class="input-box">
<label>Loan Amount</label>
<input type="number" id="loanAmount">
</div>

<div class="input-box">
<label>Duration (Months)</label>
<select id="duration" onchange="calculateEMI()">
<option value="12">12 Months</option>
<option value="24">24 Months</option>
<option value="36">36 Months</option>
<option value="48">48 Months</option>
<option value="60">60 Months</option>
</select>
</div>

<div class="input-box">
<label>Interest Rate (%)</label>
<input type="number" value="10" id="interestRate">
</div>

</div>

<div class="emi-box">

<h2>
Monthly EMI :
₹ <span id="emiAmount">0</span>
</h2>

</div>

<button class="btn" onclick="applyLoan()">
Apply Loan
</button>

</div>

</div>

<script>

document.getElementById("accountNumber").value =
sessionStorage.getItem("customerAccountNumber");

document.getElementById("customerName").value =
sessionStorage.getItem("customerName");


function calculateEMI(){

    const principal =
    parseFloat(
        document.getElementById("loanAmount").value
    ) || 0;

    const months =
    parseInt(
        document.getElementById("duration").value
    );

    const annualRate =
    parseFloat(
        document.getElementById("interestRate").value
    );

    const monthlyRate =
    annualRate / 12 / 100;

    const emi =
    (
        principal *
        monthlyRate *
        Math.pow(1 + monthlyRate, months)
    ) /
    (
        Math.pow(1 + monthlyRate, months) - 1
    );

    document.getElementById("emiAmount").innerText =
    emi ? emi.toFixed(2) : 0;

}


document.getElementById(
    "loanAmount"
).addEventListener(
    "input",
    calculateEMI
);


async function applyLoan(){

    const payload = {

        account_number:
        sessionStorage.getItem(
            "customerAccountNumber"
        ),

        customer_name:
        sessionStorage.getItem(
            "customerName"
        ),

        branch_id:
        sessionStorage.getItem(
            "customerBranchId"
        ),

        loan_type:
        document.getElementById(
            "loanType"
        ).value,

        loan_amount:
        document.getElementById(
            "loanAmount"
        ).value,

        duration_months:
        document.getElementById(
            "duration"
        ).value,

        interest_rate:
        document.getElementById(
            "interestRate"
        ).value,

        monthly_emi:
        document.getElementById(
            "emiAmount"
        ).innerText

    };

    const response =
    await fetch("/loan/apply",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(payload)

    });

    const data =
    await response.json();

    alert(data.message);

}

</script>

</body>
</html>
