<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#f5f6f8;
    padding-top:60px;
}

.topbar{
    background:#C62828;
    color:white;
    padding:12px 20px;
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
}

.card-box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

.btn-red{
    background:#C62828;
    color:white;
}

.btn-red:hover{
    background:#a71d1d;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar d-flex justify-content-between">
    <h5>Branch Management</h5>
    <div>
        <a href="Admin.html" class="btn btn-light btn-sm">Back</a>
        <a href="Login.html" class="btn btn-light btn-sm">Logout</a>
    </div>
</div>

<div class="container">

<div class="card-box">

<!-- ================= TABS ================= -->
<ul class="nav nav-tabs">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#createTab">
Create Branch
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#showTab">
Show Branches
</button>
</li>

</ul>

<!-- ================= TAB CONTENT ================= -->
<div class="tab-content mt-3">

<!-- CREATE TAB -->
<div class="tab-pane fade show active" id="createTab">

<form id="createBranchForm" class="row g-3">

<div class="col-md-6">
<label>Branch Name</label>
<input class="form-control" name="branch_name" required>
</div>

<div class="col-md-4">
<label>City</label>
<input class="form-control" name="city" required>
</div>

<div class="col-md-4">
<label>State</label>
<input class="form-control" name="state" required>
</div>

<div class="col-md-4">
<label>Contact</label>
<input class="form-control" name="contact" required>
</div>

<div class="col-12">
<label>Address</label>
<input class="form-control" name="address" required>
</div>

<div class="col-12">
<button class="btn btn-red w-100">Create Branch</button>
</div>

</form>

</div>

<!-- SHOW TAB -->
<div class="tab-pane fade" id="showTab">

<table class="table table-bordered mt-3">

<thead>
<tr>
    <th>Branch ID</th>
    <th>Branch Name</th>
    <th>City</th>
    <th>State</th>
    <th>Contact</th>
    <th>Manager</th>
</tr>
</thead>

<tbody id="branchTable"></tbody>

</table>

</div>

</div>

</div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

const API = "http://127.0.0.1:8000";

/* ================= LOAD BRANCHES ================= */
async function loadBranches() {
    try {
        const res = await fetch(`${API}/branch/all`);
        const data = await res.json();

        const tbody = document.getElementById("branchTable");
        tbody.innerHTML = "";

        data.forEach(b => {
            tbody.innerHTML += `
            <tr>
                <td>${b.branch_id}</td>
                <td>${b.branch_name}</td>
                <td>${b.city}</td>
                <td>${b.state}</td>
                <td>${b.contact}</td>
                <td>${b.manager_name || "Not Assigned"}</td>
            </tr>
            `;
        });

    } catch (err) {
        console.error("Error loading branches:", err);
    }
}

/* ================= CREATE BRANCH ================= */
document.getElementById("createBranchForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = new FormData(e.target);

    try {
        const res = await fetch(`${API}/branch/create`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                branch_name: form.get("branch_name"),
                city: form.get("city"),
                state: form.get("state"),
                address: form.get("address"),
                contact: form.get("contact")
            })
        });

        if (!res.ok) {
            const err = await res.text();
            alert("Error: " + err);
            return;
        }

        e.target.reset();

        // switch to SHOW tab
        new bootstrap.Tab(document.querySelector('[data-bs-target="#showTab"]')).show();

        // reload data
        loadBranches();

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
});

/* ================= INIT ================= */
loadBranches();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
