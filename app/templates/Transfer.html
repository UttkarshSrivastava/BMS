<!DOCTYPE html>
<html>
<head>
    <title>Bank Transfer</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
            box-shadow: 0px 0px 10px gray;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0056b3;
        }

        .details {
            margin-top: 15px;
            padding: 10px;
            background: #e9f5ff;
            border-radius: 5px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💳 Transfer Money</h2>

    <!-- Sender Account -->
    <label>Sender Account No:</label>
    <input type="text" id="sender" placeholder="Enter sender account number" required>

    <!-- Receiver Account -->
    <label>Receiver Account No:</label>
    <input type="text" id="receiver" placeholder="Enter receiver account number" required>

    <!-- Fetch Button -->
    <button type="button" onclick="fetchReceiverDetails()">
        Fetch Receiver Details
    </button>

    <!-- Receiver Details -->
    <div id="receiverDetails" class="details" style="display:none;"></div>

    <!-- Payment Section -->
    <div id="paymentSection" style="display:none;">

        <label>Amount:</label>
        <input type="number" id="amount" placeholder="Enter amount">

        <button type="button" onclick="transferMoney()">
            Send Payment
        </button>

    </div>

    <!-- Message -->
    <div id="messageBox"></div>

</div>

<script>

const API_BASE = "http://localhost:8000";

async function fetchReceiverDetails() {

    const receiver = document.getElementById("receiver").value.trim();

    if (!receiver) {
        showMessage("Please enter receiver account number", false);
        return;
    }

    try {

        const response = await fetch(
            `${API_BASE}/api/transfer/receiver/${receiver}`
        );

        const data = await response.json();

        if (!response.ok) {
            showMessage(data.detail || "Receiver account not found", false);
            return;
        }

        document.getElementById("receiverDetails").style.display = "block";

        document.getElementById("receiverDetails").innerHTML = `
            <h3>Receiver Details</h3>

            <p><strong>Name:</strong> ${data.customer_name}</p>

            <p><strong>Email:</strong> ${data.email}</p>

            <p><strong>Mobile:</strong> ${data.mobile}</p>

            <p><strong>Branch:</strong> ${data.branch_id}</p>
        `;

        document.getElementById("paymentSection").style.display = "block";

        showMessage("", true);

    } catch (error) {

        showMessage("Network error", false);

    }
}

async function transferMoney() {

    const sender = document.getElementById("sender").value.trim();

    const receiver = document.getElementById("receiver").value.trim();

    const amount = document.getElementById("amount").value;

    if (!sender || !receiver || !amount) {
        showMessage("All fields are required", false);
        return;
    }

    if (Number(amount) <= 0) {
        showMessage("Amount must be greater than zero", false);
        return;
    }

    try {

        const response = await fetch(
            `${API_BASE}/api/transfer-money`,
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    sender_account: sender,
                    receiver_account: receiver,
                    amount: amount
                })
            }
        );

        const data = await response.json();

        if (!response.ok) {
            showMessage(data.detail || "Transfer failed", false);
            return;
        }

        showMessage("Payment transferred successfully", true);

        document.getElementById("amount").value = "";

    } catch (error) {

        showMessage("Network error", false);

    }
}

function showMessage(message, success) {

    const box = document.getElementById("messageBox");

    if (!message) {
        box.innerHTML = "";
        return;
    }

    box.innerHTML = `
        <div class="${success ? 'success' : 'error'}">
            ${message}
        </div>
    `;
}

</script>

</body>
</html>
