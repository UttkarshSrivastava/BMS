<!DOCTYPE html>
<html>
<head>
    <title>Credit Transaction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
        }

                .header {
            background: #0a3d62;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

                .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #0a3d62;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #07407a;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="header">
    🏦 My Bank - Credit Service
</div>

<div class="container">
    <h2>Credit Amount</h2>

    <form id="creditForm" onsubmit="return false;">

        <label>Account ID</label>
        <input type="number" name="accountId" placeholder="Enter Account ID" required>

        <label>Amount</label>
        <input type="number" name="amount" placeholder="Enter Amount" required min="1">

        <button type="submit">Credit Now</button>
    </form>

    <div class="footer">
        Secure Banking Transaction 🔒
    </div>
</div>

</body>
</html>
